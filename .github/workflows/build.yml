name: Build Go Scoreboard

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.22'

      - name: Build EXE
        run: go build -o scoreboard.exe

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: scoreboard
          path: scoreboard.exe
